<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moyer Music - 控制台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- 引入 CryptoJS 用于本地生成七牛云 Token -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body class="bg-slate-100 text-slate-800 p-6 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // === 新增：文件上传组件 ===
        const DragDropFile = ({ label, accept, onFileSelect, file, isRequired, icon = "fa-cloud-upload-alt", subtext="点击或将文件拖拽到此处" }) => {
            const [isDragging, setIsDragging] = useState(false);
            const fileInputRef = useRef(null);

            const handleDragOver = (e) => {
                e.preventDefault();
                setIsDragging(true);
            };

            const handleDragLeave = () => {
                setIsDragging(false);
            };

            const handleDrop = (e) => {
                e.preventDefault();
                setIsDragging(false);
                if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
                    onFileSelect(e.dataTransfer.files[0]);
                }
            };

            return (
                <div
                    className={`border-2 border-dashed rounded-xl p-4 text-center transition-colors cursor-pointer relative overflow-hidden flex flex-col items-center justify-center
                        ${isDragging ? 'border-sky-500 bg-sky-50' : 'border-slate-300 hover:border-sky-400 bg-slate-50/50'}
                        ${file ? 'border-green-400 bg-green-50' : ''}`}
                    onDragOver={handleDragOver}
                    onDragLeave={handleDragLeave}
                    onDrop={handleDrop}
                    onClick={() => fileInputRef.current.click()}
                >
                    <input
                        type="file"
                        className="hidden"
                        accept={accept}
                        ref={fileInputRef}
                        onChange={(e) => onFileSelect(e.target.files[0])}
                    />
                    <i className={`fas ${file ? 'fa-check-circle text-green-500' : icon + ' text-slate-400'} text-3xl mb-2 transition-transform ${isDragging ? 'scale-110 text-sky-500' : ''}`}></i>
                    <p className="text-sm text-slate-700 font-bold truncate px-2 max-w-full">
                        {file ? file.name : <>{label} {isRequired && <span className="text-red-500 ml-1">*</span>}</>}
                    </p>
                    <p className="text-xs text-slate-400 mt-1">{file ? '点击重新选择' : subtext}</p>
                </div>
            );
        };

        // === 新增：文件本地 XOR 加密器 ===
        const CRYPTO_KEY = "123456a\\";
        const encryptFile = async (file) => {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const buffer = e.target.result;
                        const view = new Uint8Array(buffer);
                        const key = new TextEncoder().encode(CRYPTO_KEY);
                        for (let i = 0; i < view.length; i++) {
                            view[i] ^= key[i % key.length];
                        }
                        resolve(new Blob([view], { type: 'application/octet-stream' }));
                    } catch (err) {
                        reject(err);
                    }
                };
                reader.onerror = () => reject(new Error("文件读取失败"));
                reader.readAsArrayBuffer(file);
            });
        };

        function App() {
            // 七牛云配置
            const [qiniuConfig, setQiniuConfig] = useState({
                ak: localStorage.getItem('qn_ak') || '',
                sk: localStorage.getItem('qn_sk') || '',
                bucket: localStorage.getItem('qn_bucket') || 'moyermymusicplayer',
                domain: localStorage.getItem('qn_domain') || 'https://moyermusic.cn',
                uploadUrl: localStorage.getItem('qn_upload_url') || 'https://upload-as0.qiniup.com'
            });

            // 歌曲信息表单
            const [songForm, setSongForm] = useState({
                title: '', artist: '', category: '流行', isPrivate: false
            });

            // 文件状态
            const [files, setFiles] = useState({ music: null, cover: null, lrc: null });
            const [existingSongs, setExistingSongs] = useState([]);
            const [logs, setLogs] = useState([]);
            const [isUploading, setIsUploading] = useState(false);
            const [jsonFile, setJsonFile] = useState(null);

            // 读取已有的 songs.json
            const handleJsonUpload = (file) => {
                if (!file) return;
                setJsonFile(file);
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const json = JSON.parse(event.target.result);
                        setExistingSongs(json);
                        addLog(`成功加载现有 JSON，当前库中共有 ${json.length} 首歌曲`);
                    } catch (err) {
                        alert("JSON 格式错误");
                        setJsonFile(null);
                    }
                };
                reader.readAsText(file);
            };

            const addLog = (msg) => setLogs(prev => [msg, ...prev]);

            const saveConfig = () => {
                localStorage.setItem('qn_ak', qiniuConfig.ak);
                localStorage.setItem('qn_sk', qiniuConfig.sk);
                localStorage.setItem('qn_bucket', qiniuConfig.bucket);
                localStorage.setItem('qn_domain', qiniuConfig.domain);
                localStorage.setItem('qn_upload_url', qiniuConfig.uploadUrl);
                addLog("七牛云配置已保存在本地");
            };

            const generateQiniuToken = (keyToOverwrite = null) => {
                const deadline = Math.floor(Date.now() / 1000) + 3600; 
                const putPolicy = {
                    scope: keyToOverwrite ? `${qiniuConfig.bucket}:${keyToOverwrite}` : qiniuConfig.bucket,
                    deadline: deadline
                };
                
                const base64EncodeUrlSafe = (str) => {
                    const encoded = CryptoJS.enc.Base64.stringify(CryptoJS.enc.Utf8.parse(str));
                    return encoded.replace(/\//g, '_').replace(/\+/g, '-');
                };

                const encodedPutPolicy = base64EncodeUrlSafe(JSON.stringify(putPolicy));
                const sign = CryptoJS.HmacSHA1(encodedPutPolicy, qiniuConfig.sk);
                const encodedSign = CryptoJS.enc.Base64.stringify(sign).replace(/\//g, '_').replace(/\+/g, '-');
                
                return `${qiniuConfig.ak}:${encodedSign}:${encodedPutPolicy}`;
            };

            // 上传处理函数
            const uploadToQiniu = async (file, prefix) => {
                if (!file) return "";
                // 如果文件已被加密，强制改变特征和文件后缀
                const isEncrypted = file.name.endsWith('.enc');
                let ext = file.name.split('.').pop();
                if (isEncrypted) ext = "enc"; 
                
                const key = `${prefix}/${Date.now()}_${Math.random().toString(36).substring(7)}.${ext}`;
                const token = generateQiniuToken();

                const formData = new FormData();
                formData.append('file', file);
                formData.append('key', key);
                formData.append('token', token);

                addLog(`⏳ [${prefix}] 正在努力上传文件: ${file.name}... (请耐心等待)`);

                const response = await fetch(qiniuConfig.uploadUrl, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error(`[${prefix}] 上传失败: ${response.statusText}`);
                }
                
                addLog(`✅ [${prefix}] 上传成功: ${key}`);
                return key;
            };

            // 核心：处理表单
            const handleProcess = async () => {
                if (!qiniuConfig.ak || !qiniuConfig.sk) return alert("请先填写七牛云 AK 和 SK！");
                if (!files.music || !songForm.title || !songForm.artist) return alert("必填信息不完整！");
                if (existingSongs.length === 0) return alert("请先导入现有的 songs.json！");

                setIsUploading(true);
                addLog(`========== 开始处理: ${songForm.title} ==========`);
                
                // 强制转换安全类型
                const isPriv = songForm.isPrivate === true || String(songForm.isPrivate) === 'true';
                
                try {
                    // ====== 核心：端到端加密准备 ======
                    let musicFileToUpload = files.music;
                    let coverFileToUpload = files.cover;
                    let lrcFileToUpload = files.lrc;
                    
                    if (isPriv) {
                        addLog(`🔒 启用私人空间防御，正在本地进行媒体文件异或混淆加密...`);
                        await new Promise(r => setTimeout(r, 50)); // 触发 UI 刷新
                        
                        // 1. 加密音频
                        if (files.music) {
                            const encryptedBlob = await encryptFile(files.music);
                            musicFileToUpload = new File([encryptedBlob], files.music.name + ".enc", { type: "application/octet-stream" });
                            addLog(`🛡️ 音乐已完成加密混淆 (新后缀: .enc)`);
                        }
                        
                        // 2. 加密封面
                        if (files.cover) {
                            const encryptedBlob = await encryptFile(files.cover);
                            coverFileToUpload = new File([encryptedBlob], files.cover.name + ".enc", { type: "application/octet-stream" });
                            addLog(`🛡️ 封面已完成加密混淆 (新后缀: .enc)`);
                        }
                        
                        // 3. 加密歌词
                        if (files.lrc) {
                            const encryptedBlob = await encryptFile(files.lrc);
                            lrcFileToUpload = new File([encryptedBlob], files.lrc.name + ".enc", { type: "application/octet-stream" });
                            addLog(`🛡️ 歌词已完成加密混淆 (新后缀: .enc)`);
                        }
                    }

                    // 串行上传以保证稳定
                    const musicKey = await uploadToQiniu(musicFileToUpload, "music");
                    let coverKey = "";
                    if (coverFileToUpload) coverKey = await uploadToQiniu(coverFileToUpload, "cover");
                    let lrcKey = "";
                    if (lrcFileToUpload) lrcKey = await uploadToQiniu(lrcFileToUpload, "lrc");

                    const domainStr = qiniuConfig.domain.endsWith('/') ? qiniuConfig.domain.slice(0, -1) : qiniuConfig.domain;
                    
                    const finalUrl = `${domainStr}/${musicKey}`;
                    const finalCover = coverKey ? `${domainStr}/${coverKey}` : "";
                    const finalLrc = lrcKey ? `${domainStr}/${lrcKey}` : "";

                    // 生成 ID
                    let newId = 1;
                    if (isPriv) {
                        const privateIds = existingSongs.filter(s => s.isPrivate || s.id >= 1000).map(s => s.id);
                        newId = privateIds.length > 0 ? Math.max(1000, ...privateIds) + 1 : 1001;
                    } else {
                        const publicIds = existingSongs.filter(s => !s.isPrivate && s.id < 1000).map(s => s.id);
                        newId = publicIds.length > 0 ? Math.max(0, ...publicIds) + 1 : 1;
                    }
                    
                    const newSong = {
                        id: newId,
                        title: songForm.title,
                        artist: songForm.artist,
                        category: songForm.category,
                        cover: finalCover,
                        url: finalUrl,
                        lrc: finalLrc,
                        isPrivate: isPriv
                    };

                    const updatedSongs = [...existingSongs, newSong];
                    setExistingSongs(updatedSongs);
                    addLog(`🎉 成功添加歌曲：${newSong.title} (分配 ID: ${newId}，总计: ${updatedSongs.length} 首)`);
                    
                    // 修改点：去掉了 artist: ''，这样每次传完歌，上一次填写的歌手名字会被保留
                    setSongForm({...songForm, title: ''}); 
                    setFiles({ music: null, cover: null, lrc: null });

                } catch (err) {
                    addLog(`❌ 错误: ${err.message}`);
                    console.error(err);
                } finally {
                    setIsUploading(false);
                }
            };

            const downloadJson = () => {
                if (existingSongs.length === 0) return alert("当前没有可导出的数据！");
                const blob = new Blob([JSON.stringify(existingSongs, null, 2)], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `songs.json`;
                a.click();
                URL.revokeObjectURL(url);
                addLog("⬇️ songs.json 已打包下载！请将该文件替换到项目中。");
            };

            return (
                <div className="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
                    <div className="lg:col-span-7 space-y-6 flex flex-col">
                        <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                            <h2 className="text-lg font-bold mb-4"><i className="fas fa-cog text-sky-500 mr-2"></i>1. 基础配置 (保存在本地)</h2>
                            <div className="grid grid-cols-2 gap-3 mb-3">
                                <div><label className="text-xs text-slate-500">Access Key (AK)</label><input type="password" value={qiniuConfig.ak} onChange={e=>setQiniuConfig({...qiniuConfig, ak: e.target.value})} className="w-full border p-2 rounded-lg text-sm outline-none focus:border-sky-500"/></div>
                                <div><label className="text-xs text-slate-500">Secret Key (SK)</label><input type="password" value={qiniuConfig.sk} onChange={e=>setQiniuConfig({...qiniuConfig, sk: e.target.value})} className="w-full border p-2 rounded-lg text-sm outline-none focus:border-sky-500"/></div>
                                <div><label className="text-xs text-slate-500">空间名称 (Bucket)</label><input type="text" value={qiniuConfig.bucket} onChange={e=>setQiniuConfig({...qiniuConfig, bucket: e.target.value})} className="w-full border p-2 rounded-lg text-sm outline-none focus:border-sky-500"/></div>
                                <div><label className="text-xs text-slate-500">上传节点</label>
                                    <select value={qiniuConfig.uploadUrl} onChange={e=>setQiniuConfig({...qiniuConfig, uploadUrl: e.target.value})} className="w-full border p-2 rounded-lg text-sm outline-none focus:border-sky-500">
                                        <option value="https://upload.qiniup.com">华东 (upload.qiniup.com)</option>
                                        <option value="https://upload-z1.qiniup.com">华北 (upload-z1.qiniup.com)</option>
                                        <option value="https://upload-z2.qiniup.com">华南 (upload-z2.qiniup.com)</option>
                                        <option value="https://upload-as0.qiniup.com">新加坡 (upload-as0.qiniup.com)</option>
                                    </select>
                                </div>
                                <div className="col-span-2"><label className="text-xs text-slate-500">绑定的 HTTPS 域名</label><input type="text" value={qiniuConfig.domain} onChange={e=>setQiniuConfig({...qiniuConfig, domain: e.target.value})} className="w-full border p-2 rounded-lg text-sm outline-none focus:border-sky-500" placeholder="https://moyermusic.cn"/></div>
                            </div>
                            <button onClick={saveConfig} className="bg-slate-800 text-white px-5 py-2 rounded-lg text-sm hover:bg-slate-700 transition active:scale-95">保存配置</button>
                        </div>

                        <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                            <h2 className="text-lg font-bold mb-3"><i className="fas fa-file-code text-purple-500 mr-2"></i>2. 导入现有的 JSON</h2>
                            <DragDropFile 
                                label="拖入 songs.json 文件" 
                                accept=".json" 
                                onFileSelect={handleJsonUpload} 
                                file={jsonFile} 
                                icon="fa-file-alt" 
                            />
                        </div>

                        <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 flex-1">
                            <h2 className="text-lg font-bold mb-4"><i className="fas fa-music text-green-500 mr-2"></i>3. 录入新歌信息并上传</h2>
                            <div className="space-y-4">
                                <div className="grid grid-cols-2 gap-3">
                                    <div><label className="text-xs text-slate-500">歌曲名 <span className="text-red-500">*</span></label><input type="text" value={songForm.title} onChange={e=>setSongForm({...songForm, title: e.target.value})} className="w-full border p-2 rounded-lg text-sm outline-none focus:border-green-500"/></div>
                                    <div><label className="text-xs text-slate-500">歌手 <span className="text-red-500">*</span></label><input type="text" value={songForm.artist} onChange={e=>setSongForm({...songForm, artist: e.target.value})} className="w-full border p-2 rounded-lg text-sm outline-none focus:border-green-500"/></div>
                                    <div><label className="text-xs text-slate-500">分类</label><input type="text" value={songForm.category} onChange={e=>setSongForm({...songForm, category: e.target.value})} className="w-full border p-2 rounded-lg text-sm outline-none focus:border-green-500"/></div>
                                    <div>
                                        <label className="text-xs text-slate-500 font-bold text-red-500">可见性 (防审查保护)</label>
                                        <select value={songForm.isPrivate ? 'true' : 'false'} onChange={e=>setSongForm({...songForm, isPrivate: e.target.value === 'true'})} className="w-full border-2 border-red-200 bg-red-50 p-2 rounded-lg text-sm outline-none focus:border-red-500 text-red-600 font-bold">
                                            <option value="false">公开</option>
                                            <option value="true">私人珍藏 (自动加密隐藏)</option>
                                        </select>
                                    </div>
                                </div>
                                
                                <hr className="border-slate-100"/>
                                
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
                                    <DragDropFile 
                                        label="音乐文件" 
                                        accept="audio/*,video/mp4" 
                                        onFileSelect={(f) => {
                                            setFiles({...files, music: f});
                                            // 修改点：选择文件后自动解析文件名并填入歌曲名（去后缀）
                                            if (f && f.name) {
                                                const fileNameWithoutExt = f.name.substring(0, f.name.lastIndexOf('.')) || f.name;
                                                setSongForm(prev => ({...prev, title: fileNameWithoutExt}));
                                            }
                                        }} 
                                        file={files.music} 
                                        isRequired={true}
                                        icon="fa-file-audio"
                                        subtext="FLAC / MP3"
                                    />
                                    <DragDropFile 
                                        label="封面壁纸" 
                                        accept="image/*,video/mp4" 
                                        onFileSelect={(f) => setFiles({...files, cover: f})} 
                                        file={files.cover} 
                                        isRequired={false}
                                        icon="fa-image"
                                        subtext="(选填) JPG / MP4"
                                    />
                                    <DragDropFile 
                                        label="歌词文件" 
                                        accept=".lrc" 
                                        onFileSelect={(f) => setFiles({...files, lrc: f})} 
                                        file={files.lrc} 
                                        isRequired={false}
                                        icon="fa-closed-captioning"
                                        subtext="(选填) LRC"
                                    />
                                </div>

                                <button onClick={handleProcess} disabled={isUploading || existingSongs.length === 0} 
                                    className={`w-full font-bold py-3.5 rounded-xl transition-all ${isUploading || existingSongs.length === 0 ? 'bg-slate-300 text-slate-500 cursor-not-allowed' : 'bg-green-500 hover:bg-green-600 text-white shadow-lg shadow-green-500/30 active:scale-[0.98]'}`}>
                                    {isUploading ? <><i className="fas fa-spinner fa-spin mr-2"></i> 处理中...如果文件大请勿关闭页面</> : <><i className="fas fa-cloud-upload-alt mr-2"></i>上传该歌曲到列表</>}
                                </button>
                            </div>
                        </div>
                    </div>

                    <div className="lg:col-span-5 flex flex-col space-y-6 h-full">
                        <div className="bg-gradient-to-br from-slate-800 to-slate-900 p-6 rounded-2xl shadow-xl border border-slate-700 text-white">
                            <h2 className="text-lg font-bold mb-2 flex items-center"><i className="fas fa-box-open text-yellow-400 mr-2"></i>4. 统一打包导出</h2>
                            <p className="text-sm text-slate-400 mb-5">上传完所有歌曲后，点击此处导出。</p>
                            
                            <div className="flex items-center justify-between bg-slate-800/50 p-4 rounded-xl border border-slate-700/50">
                                <div>
                                    <span className="text-xs text-slate-400 block mb-1">当前音乐库总量</span>
                                    <span className="text-3xl font-bold text-sky-400">{existingSongs.length} <span className="text-sm text-slate-500 font-normal">首</span></span>
                                </div>
                                <button onClick={downloadJson} disabled={existingSongs.length === 0}
                                    className={`px-5 py-3 rounded-xl font-bold transition-all shadow-lg active:scale-95 ${existingSongs.length === 0 ? 'bg-slate-700 text-slate-500 cursor-not-allowed' : 'bg-yellow-500 hover:bg-yellow-400 text-slate-900 shadow-yellow-500/20'}`}>
                                    <i className="fas fa-download mr-2"></i>下载 songs.json
                                </button>
                            </div>
                        </div>

                        <div className="bg-slate-900 text-green-400 p-5 rounded-2xl shadow-inner font-mono text-sm flex flex-col flex-1 min-h-[400px]">
                            <div className="flex justify-between items-center mb-4 text-slate-400 pb-2 border-b border-slate-800">
                                <h2 className="font-bold"><i className="fas fa-terminal mr-2"></i>执行日志</h2>
                                <button onClick={()=>setLogs([])} className="hover:text-white transition"><i className="fas fa-trash"></i> 清空</button>
                            </div>
                            <div className="flex-1 overflow-y-auto space-y-1.5" style={{scrollbarWidth: 'none', msOverflowStyle: 'none'}}>
                                {logs.map((log, i) => <div key={i} className="break-words leading-relaxed"><span className="text-slate-600 mr-2">{'>'}</span>{log}</div>)}
                                {logs.length === 0 && <div className="text-slate-600 italic">等待操作...</div>}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
